<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy J1 Blog</title>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark:      #0f0f0f;
      --bg-panel:     #1a1a1a;
      --bg-card:      #222222;
      --bg-input:     #2a2a2a;
      --accent:       #f5e6c8;
      --accent-dim:   #c4b49a;
      --accent-hover: #ffe8b0;
      --border:       #333333;
      --border-light: #444444;
      --text-primary: #e8e0d5;
      --text-muted:   #888888;
      --danger:       #e74c3c;
      --success:      #27ae60;
      --tab-active-bg: #2a2520;
    }

    html, body {
      height: 100%;
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      font-size: 14px;
    }

    /* ── Layout Wrapper ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .header .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .header .logo span {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 13px;
      margin-left: 6px;
    }

    /* ── Smartstore Bar (사업자별 2행: 카페24 상품NO+전송 / 스마트스토어 URL) ── */
    .smartstore-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      padding: 6px 0;
    }

    .biz-col {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .biz-row1, .biz-row2 {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .biz-row1 label {
      color: var(--accent-dim);
      font-size: 11px;
      white-space: nowrap;
      width: 56px;
      flex-shrink: 0;
    }

    .smartstore-bar input {
      flex: 1;
      min-width: 0;
      background: var(--bg-input);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      color: var(--text-primary);
      padding: 6px 10px;
      font-size: 12px;
      outline: none;
      transition: border-color .2s;
    }

    .smartstore-bar input:focus {
      border-color: var(--accent);
    }

    .smartstore-bar input::placeholder {
      color: var(--text-muted);
    }

    .btn-send-one {
      flex-shrink: 0;
      padding: 6px 12px;
      font-size: 11px;
      white-space: nowrap;
    }

    .btn-send-all {
      flex-shrink: 0;
      white-space: nowrap;
    }

    .btn {
      background: var(--accent);
      color: #1a1200;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, transform .1s;
    }

    .btn:hover  { background: var(--accent-hover); }
    .btn:active { transform: scale(.97); }
    .btn:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    .btn:disabled:hover { background: var(--accent); transform: none; }

    .btn-secondary {
      background: var(--bg-card);
      color: var(--accent);
      border: 1px solid var(--border-light);
    }

    .btn-secondary:hover {
      background: var(--tab-active-bg);
      border-color: var(--accent-dim);
    }
    .btn-secondary:disabled:hover {
      background: var(--bg-card);
      border-color: var(--border-light);
    }

    .btn-naver {
      background: #03c75a;
      color: #fff;
      border: none;
    }

    .btn-naver:hover { background: #02a84a; }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .btn-danger:hover { background: rgba(231,76,60,.12); }

    /* ── Google Login Button ── */
    .btn-google {
      background: #fff;
      color: #3c4043;
      border: 1px solid #dadce0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, box-shadow .15s;
      flex-shrink: 0;
    }
    .btn-google:hover { background: #f8f9fa; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
    .btn-google svg { flex-shrink: 0; }

    .btn-google-signout {
      background: var(--bg-card);
      color: var(--accent-dim);
      border: 1px solid var(--border-light);
      font-size: 12px;
      padding: 7px 12px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
      flex-shrink: 0;
    }
    .btn-google-signout:hover { background: var(--tab-active-bg); }

    .google-user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .google-user-email {
      font-size: 12px;
      color: var(--accent-dim);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Tabs ── */
    .tabs-row {
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 4px;
      flex-shrink: 0;
    }

    .tab {
      padding: 10px 20px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }

    .tab:hover { color: var(--text-primary); }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── J12 Blog Toggle ── */
    .blog-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
      padding: 6px 0;
    }

    .blog-toggle label {
      color: var(--text-muted);
      font-size: 12px;
    }

    .toggle-switch {
      display: flex;
      background: var(--bg-input);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      overflow: hidden;
    }

    .toggle-option {
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-muted);
      transition: background .15s, color .15s;
    }

    .toggle-option.selected {
      background: var(--accent);
      color: #1a1200;
    }

    /* ── Main Content ── */
    .main {
      flex: 1;
      overflow: hidden;
      padding: 16px 20px;
    }

    .panel-container {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      height: 100%;
    }

    /* ── Panel ── */
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent-dim);
      letter-spacing: .5px;
      text-transform: uppercase;
      flex: 1;
    }

    .panel-badge {
      font-size: 10px;
      background: var(--bg-input);
      color: var(--text-muted);
      border-radius: 4px;
      padding: 2px 7px;
    }

    .panel-badge.blogger-link {
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, color .15s, box-shadow .15s;
    }

    .panel-badge.blogger-link:hover {
      background: var(--tab-active-bg);
      color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-dim);
    }

    .panel-body {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── Post List (Left Panel) ── */
    .post-list-wrap {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .post-list-auth-notice {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 100%;
      padding: 24px;
      color: var(--text-muted);
      font-size: 13px;
      text-align: center;
    }

    .post-list-auth-notice .lock-icon {
      font-size: 32px;
      opacity: .5;
    }

    .post-list-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 100%;
      color: var(--text-muted);
      font-size: 13px;
    }

    .post-list {
      overflow-y: auto;
      flex: 1;
    }

    .post-list-item {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .12s;
    }

    .post-list-item:hover {
      background: var(--bg-card);
    }

    .post-list-item.active {
      background: var(--tab-active-bg);
      border-left: 2px solid var(--accent);
    }

    .post-list-item .post-item-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 3px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-list-item .post-item-date {
      font-size: 10px;
      color: var(--text-muted);
    }

    .post-list-empty {
      padding: 24px 14px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* ── Load More Button ── */
    .load-more-wrap {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .load-more-wrap .btn {
      width: 100%;
      font-size: 12px;
      padding: 7px 12px;
    }

    /* ── Accordion Preview ── */
    .post-preview {
      display: none;
      max-height: 400px;
      overflow-y: auto;
      background: var(--bg-card);
      border-top: 1px solid var(--border-light);
      border-bottom: 2px solid var(--accent);
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.7;
      color: var(--text-primary);
    }

    .post-preview.open {
      display: block;
    }

    .post-preview img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }

    .post-preview a {
      color: var(--accent);
    }

    /* ── Image download: bulk button ── */
    .img-download-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-light);
    }

    .btn-img-download-all {
      background: var(--bg-input);
      color: var(--accent);
      border: 1px solid var(--border-light);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, border-color .15s;
    }

    .btn-img-download-all:hover {
      background: var(--tab-active-bg);
      border-color: var(--accent-dim);
    }

    /* ── Image download: individual overlay ── */
    .preview-img-wrap {
      position: relative;
      display: inline-block;
      max-width: 100%;
      margin: 4px 0;
    }

    .preview-img-wrap img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 4px;
    }

    .btn-img-dl-single {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 4px 7px;
      font-size: 13px;
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s, background .15s;
      line-height: 1;
    }

    .preview-img-wrap:hover .btn-img-dl-single {
      opacity: 1;
    }

    .btn-img-dl-single:hover {
      background: rgba(0,0,0,0.80);
    }

    .post-list-item .post-item-title-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .post-list-item .post-item-title-row .accordion-arrow {
      flex-shrink: 0;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
      transition: transform .2s;
      user-select: none;
    }

    .post-list-item.accordion-open .accordion-arrow {
      transform: rotate(90deg);
      color: var(--accent);
    }

    /* ── Editor panel ── */
    .editor-wrap {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .mock-post-info {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .mock-post-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .mock-post-meta {
      font-size: 11px;
      color: var(--text-muted);
    }

    textarea.html-editor {
      flex: 1;
      background: var(--bg-input);
      color: #c9d1d9;
      border: none;
      padding: 14px;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.7;
      resize: none;
      outline: none;
      overflow-y: auto;
    }

    textarea.html-editor::selection {
      background: rgba(245, 230, 200, .25);
    }

    .editor-footer {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .editor-footer .status {
      flex: 1;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Right panel ── */
    .right-panel-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px 16px;
      height: 100%;
    }

    .naver-icon {
      width: 56px;
      height: 56px;
      background: #03c75a;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
    }

    .naver-desc {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .naver-blog-id {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-dim);
      text-align: center;
    }

    .btn-naver-big {
      width: 100%;
      padding: 13px;
      font-size: 14px;
      border-radius: 8px;
    }

    .naver-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    .naver-tips {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }

    .naver-tips p {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .naver-tips strong {
      color: var(--accent-dim);
    }

    /* ── Status toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg-card);
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* ── Spinner ── */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border-light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    /* ── Schedule Panel ── */
    #schedule-panel .panel-body {
      overflow: hidden;
      position: relative;
    }

    .schedule-list {
      overflow-y: auto;
      height: 100%;
      padding: 8px;
    }

    .schedule-item {
      border-bottom: 1px solid var(--border);
    }

    .schedule-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px;
      font-size: 12px;
      flex-wrap: wrap;
    }

    .schedule-row.clickable {
      cursor: pointer;
    }

    .schedule-row.clickable:hover {
      background: rgba(255,255,255,0.04);
      border-radius: 4px;
    }

    .badge-done {
      background: #22c55e;
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
    }

    .badge-pending {
      background: #9ca3af;
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      white-space: nowrap;
    }

    .post-index {
      color: var(--accent-dim);
      font-weight: 600;
      white-space: nowrap;
      min-width: 52px;
    }

    .planned-date {
      color: var(--text-muted);
      font-size: 11px;
      white-space: nowrap;
      min-width: 70px;
    }

    .angle-text {
      flex: 1;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .editable {
      cursor: pointer;
      text-decoration: underline dotted;
    }

    .angle-input {
      flex: 1;
      border: 1px solid var(--border-light);
      background: var(--bg-input);
      color: var(--text-primary);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      outline: none;
    }

    .angle-input:focus {
      border-color: var(--accent);
    }

    .btn-save-angle {
      padding: 3px 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      white-space: nowrap;
    }

    .btn-save-angle:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Header: Logo + Smartstore Bar + Google Login ── -->
  <header class="header">
    <div class="logo">Happy J1 <span>Blog</span></div>

    <div class="smartstore-bar">
      <div class="biz-col" data-mall="소울스토어">
        <div class="biz-row1">
          <label>소울스토어</label>
          <input class="cafe24-no-input" data-mall="소울스토어" placeholder="카페24 상품NO" />
          <button class="btn btn-secondary btn-send-one" onclick="handleSendOne('소울스토어')">전송</button>
        </div>
        <div class="biz-row2">
          <input class="ss-url-input" data-mall="소울스토어" type="url" placeholder="스마트스토어 URL" />
        </div>
      </div>
      <div class="biz-col" data-mall="제이원투몰">
        <div class="biz-row1">
          <label>제이원투몰</label>
          <input class="cafe24-no-input" data-mall="제이원투몰" placeholder="카페24 상품NO" />
          <button class="btn btn-secondary btn-send-one" onclick="handleSendOne('제이원투몰')">전송</button>
        </div>
        <div class="biz-row2">
          <input class="ss-url-input" data-mall="제이원투몰" type="url" placeholder="스마트스토어 URL" />
        </div>
      </div>
      <div class="biz-col" data-mall="행복산업">
        <div class="biz-row1">
          <label>행복산업</label>
          <input class="cafe24-no-input" data-mall="행복산업" placeholder="카페24 상품NO" />
          <button class="btn btn-secondary btn-send-one" onclick="handleSendOne('행복산업')">전송</button>
        </div>
        <div class="biz-row2">
          <input class="ss-url-input" data-mall="행복산업" type="url" placeholder="스마트스토어 URL" />
        </div>
      </div>
      <button class="btn btn-send-all" onclick="handleSendAll()">▶ 전체 전송</button>
    </div>

    <!-- Google Login / User Info (right side) -->
    <div id="google-login-area">
      <!-- Logged out state -->
      <button class="btn-google" id="btn-google-login" onclick="googleLogin()">
        <svg width="16" height="16" viewBox="0 0 48 48">

<script>
  /* ========================================================
     Happy J1 Blog — Client Script

  // ── Google OAuth Client ID ─────────────────────────────

  // Application type: Web application, Authorized JavaScript origins에 현재 도메인 추가 필요
  const GOOGLE_CLIENT_ID = '1076421480285-foke85tddbdi30hc9e001fs0qbq5845b.apps.googleusercontent.com';

  // ── Blogger Blog ID 매핑 ────────────────────────────────
  const BLOG_IDS = {

  // ── 사업자 설정 ──────────────────────────────────────────
  const BUSINESSES = {

  // n8n webhook endpoint (기존 스마트스토어 작업 시작용)
  const WEBHOOK_URL = 'https://n8n.wonflowai.com/webhook/happyj1-blog-register';

  // ── State ──────────────────────────────────────────────
  let currentMall    = '소울스토어';
  let currentJ12Blog = '제이원매거진';
  let accessToken    = null;   // 메모리에만 보관, localStorage 저장 안 함
  let tokenClient    = null;
  let currentPostId  = null;   // 현재 편집 중인 postId
  let currentBlogId  = null;   // 현재 선택된 blogId
  let currentNextPageToken = null; // 페이지네이션 토큰
  let isLoadingMore  = false;  // 더보기 로드 중 여부
  let allScheduleRows = [];    // schedule 시트 전체 원본 rows 캐시 (필터링용)
  let scheduleFilterProductKey = null; // 현재 글 클릭으로 필터링된 product_key (null이면 블로그 전체 스케줄)

  // ── Init ──────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    applyMall('소울스토어');
    updateAuthUI();
    // GIS 스크립트 로드 후 자동 로그인 시도
    initGoogleTokenClient();
  });

  // ── Google Token Client 초기화 & 자동 로그인 시도 ──────
  function initGoogleTokenClient() {
    // GIS 스크립트가 아직 로드되지 않았으면 100ms 후 재시도
    if (typeof google === 'undefined' || !google.accounts) {
      setTimeout(initGoogleTokenClient, 100);
      return;
    }

    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: 'https://www.googleapis.com/auth/blogger https://www.googleapis.com/auth/spreadsheets',
      callback: (tokenResponse) => {
        if (tokenResponse.error) {
          // 자동 로그인 실패 시 조용히 무시 (로그인 버튼 표시 유지)
          if (tokenResponse.error !== 'user_logged_out' &&
              tokenResponse.error !== 'access_denied' &&
              tokenResponse.error !== 'immediate_failed') {
            console.warn('[SoulKit] Google token error:', tokenResponse.error);
          }
          return;
        }
        accessToken = tokenResponse.access_token;
        updateAuthUI(true);
        showToast('✅ Google 로그인 성공');
        loadPostList();
        loadSchedule();
      },
      error_callback: (err) => {
        // 팝업 없이 실패하는 경우 (prior consent 없음 등) — 조용히 무시
        console.info('[SoulKit] Silent token refresh skipped:', err?.type || err);
      },
    });

    // 페이지 로드 시 사일런트 토큰 갱신 시도 (prompt: '' = non-interactive)
    try {
      tokenClient.requestAccessToken({ prompt: '' });
    } catch (e) {
      // 실패해도 UI에 영향 없음
      console.info('[SoulKit] Silent token request failed silently:', e);
    }
  }

  // ── Google OAuth ───────────────────────────────────────
  function googleLogin() {
    if (!tokenClient) {
      // 아직 초기화되지 않았으면 GIS 로드 대기 후 재시도
      if (typeof google === 'undefined' || !google.accounts) {
        showToast('Google Identity Services 로딩 중입니다. 잠시 후 다시 시도하세요.', true);
        return;
      }
      initGoogleTokenClient();
      // initGoogleTokenClient가 자동으로 silent 시도함, 버튼 클릭 시엔 별도로 popup 요청
      setTimeout(() => tokenClient && tokenClient.requestAccessToken({ prompt: 'select_account' }), 200);
      return;
    }
    tokenClient.requestAccessToken({ prompt: 'select_account' });
  }

  function googleSignOut() {
    if (accessToken) {
      google.accounts.oauth2.revoke(accessToken, () => {});
    }
    accessToken = null;
    tokenClient = null;
    currentPostId = null;
    updateAuthUI(false);
    resetEditor();
    renderPostListAuth(); // show auth notice
    updateScheduleAuthUI(); // show schedule auth notice
    showToast('로그아웃 되었습니다.');
  }

  function updateAuthUI(isLoggedIn) {
    const loggedOut = isLoggedIn === false || !accessToken;
    document.getElementById('btn-google-login').classList.toggle('hidden', !loggedOut);
    document.getElementById('google-user-info').classList.toggle('hidden', loggedOut);

    // 저장 버튼 활성화: 로그인 + 포스트 선택 시
    updateSaveButton();
  }

  function updateSaveButton() {
    const canSave = !!accessToken && !!currentPostId;
    document.getElementById('btn-save-post').disabled = !canSave;
  }

  // ── Tab switching ──────────────────────────────────────
  function switchTab(el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentMall = el.dataset.mall;

    const toggle = document.getElementById('j12-toggle');
    toggle.classList.toggle('hidden', currentMall !== '제이원투몰');

    currentPostId = null;
    updateSaveButton();
    applyMall(currentMall);
  }

  function switchJ12Blog(el) {
    document.querySelectorAll('.toggle-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    currentJ12Blog = el.dataset.blog;
    currentPostId = null;
    updateSaveButton();
    applyMall('제이원투몰');
  }

  // ── Apply mall configuration ───────────────────────────
  function applyMall(mall) {
    const cfg = getBloggerConfig();
    currentBlogId = cfg.blogger.blogId;
    scheduleFilterProductKey = null; // 사업자/블로그 전환 시 글 필터 초기화
    const badge = document.getElementById('blogger-badge');
    badge.textContent = cfg.blogger.label;
    badge.href = cfg.blogger.url || '#';
    renderNaverPanel(cfg.naver);
    resetEditor();

    if (accessToken) {
      loadPostList();
      loadSchedule();
    } else {
      renderPostListAuth();
      updateScheduleAuthUI();
    }
  }

  function getBloggerConfig() {
    if (currentMall === '제이원투몰') {
      return BUSINESSES['제이원투몰'].blogs[currentJ12Blog];
    }
    return BUSINESSES[currentMall];
  }

  // ── Post List (Left Panel) ─────────────────────────────
  function renderPostListAuth() {
    document.getElementById('post-list-auth-notice').classList.remove('hidden');
    document.getElementById('post-list-loading').classList.add('hidden');
    document.getElementById('post-list').classList.add('hidden');
  }

  function renderPostListLoading() {
    document.getElementById('post-list-auth-notice').classList.add('hidden');
    document.getElementById('post-list-loading').classList.remove('hidden');
    document.getElementById('post-list').classList.add('hidden');
  }

  function updateLoadMoreButton() {
    document.getElementById('load-more-wrap').classList.toggle('hidden', !currentNextPageToken);
  }

  function renderPostListItems(posts, append = false) {
    document.getElementById('post-list-auth-notice').classList.add('hidden');
    document.getElementById('post-list-loading').classList.add('hidden');

    const listEl = document.getElementById('post-list');
    listEl.classList.remove('hidden');

    if (!append) {
      listEl.innerHTML = '';
      accordionOpenPostId = null;
    }

    if (!posts || posts.length === 0) {
      if (!append) {
        listEl.innerHTML = '<div class="post-list-empty">글이 없습니다.</div>';
      }
      return;
    }

    posts.forEach(post => {
      const item = document.createElement('div');
      item.className = 'post-list-item';
      item.dataset.postId = post.id;

      const published = post.published
        ? new Date(post.published).toLocaleDateString('ko-KR')
        : '';

      item.innerHTML = `
        <div class="post-item-title-row">
          <span class="accordion-arrow">▶</span>
          <div class="post-item-title">${escapeHtml(post.title)}</div>
        </div>
        <div class="post-item-date">${published}</div>
      `;

      // Accordion preview element inserted after item
      const preview = document.createElement('div');
      preview.className = 'post-preview';
      preview.dataset.postId = post.id;

      item.addEventListener('click', () => selectPostWithAccordion(post, item, preview));
      listEl.appendChild(item);
      listEl.appendChild(preview);
    });
  }

  async function loadPostList() {
    if (!accessToken) { renderPostListAuth(); return; }

    const blogId = currentBlogId;
    if (!blogId) { showToast('blogId가 없습니다.', true); return; }

    // 페이지네이션 상태 초기화
    currentNextPageToken = null;
    updateLoadMoreButton();

    renderPostListLoading();

    try {
      const url = `https://www.googleapis.com/blogger/v3/blogs/${blogId}/posts?maxResults=15`;
      const res = await fetch(url, {
        headers: { 'Authorization': `Bearer ${accessToken}` },
      });

      if (res.status === 401) {
        accessToken = null;
        updateAuthUI(false);
        renderPostListAuth();
        showToast('인증이 만료되었습니다. 다시 로그인하세요.', true);
        return;
      }

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      currentNextPageToken = data.nextPageToken || null;
      renderPostListItems(data.items || []);
      updateLoadMoreButton();
    } catch (err) {
      document.getElementById('post-list-loading').classList.add('hidden');
      document.getElementById('post-list').classList.remove('hidden');
      document.getElementById('post-list').innerHTML =
        `<div class="post-list-empty">글 목록 로드 실패:<br/>${escapeHtml(err.message)}</div>`;
      showToast('글 목록 로드 실패: ' + err.message, true);
    }
  }

  async function loadMorePosts() {
    if (!accessToken || !currentNextPageToken || isLoadingMore) return;

    const blogId = currentBlogId;
    isLoadingMore = true;
    const btn = document.getElementById('btn-load-more');
    btn.disabled = true;
    btn.textContent = '로드 중...';

    try {
      const url = `https://www.googleapis.com/blogger/v3/blogs/${blogId}/posts?maxResults=15&pageToken=${encodeURIComponent(currentNextPageToken)}`;
      const res = await fetch(url, {
        headers: { 'Authorization': `Bearer ${accessToken}` },
      });

      if (res.status === 401) {
        accessToken = null;
        updateAuthUI(false);
        renderPostListAuth();
        showToast('인증이 만료되었습니다. 다시 로그인하세요.', true);
        return;
      }

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      currentNextPageToken = data.nextPageToken || null;
      renderPostListItems(data.items || [], true);
      updateLoadMoreButton();
    } catch (err) {
      showToast('더보기 로드 실패: ' + err.message, true);
    } finally {
      isLoadingMore = false;
      btn.disabled = false;
      btn.textContent = '더보기';
    }
  }

  // Track currently open accordion
  let accordionOpenPostId = null;

  async function selectPostWithAccordion(post, itemEl, previewEl) {
    const postId = post.id;
    const isSamePost = accordionOpenPostId === postId;

    // Close any open accordion
    document.querySelectorAll('.post-preview.open').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.post-list-item.accordion-open').forEach(el => el.classList.remove('accordion-open'));

    if (isSamePost) {
      // Toggle off — collapse
      accordionOpenPostId = null;
    } else {
      // Open this accordion (show preview from post.content if available in list data,
      // otherwise we load it from the API — selectPost will fetch it anyway)
      accordionOpenPostId = postId;
      itemEl.classList.add('accordion-open');

      if (post.content) {
        previewEl.innerHTML = post.content;
        injectImageDownloadUI(previewEl, post.title || '');
        previewEl.classList.add('open');
      } else {
        previewEl.innerHTML = '<em style="color:var(--text-muted)">미리보기 로드 중...</em>';
        previewEl.classList.add('open');
      }
    }

    // 오른쪽 발행 스케줄 패널: 클릭한 글에 연결된 상품 스케줄로 필터링
    filterScheduleByPost(post);

    // Always load into editor (existing behavior)
    selectPost(postId, itemEl, previewEl);
  }

  async function selectPost(postId, itemEl, previewEl) {
    // Highlight selected item
    document.querySelectorAll('.post-list-item').forEach(el => el.classList.remove('active'));
    itemEl.classList.add('active');

    currentPostId = postId;
    updateSaveButton();
    setEditorStatus('글 로딩 중...');

    try {
      const url = `https://www.googleapis.com/blogger/v3/blogs/${currentBlogId}/posts/${postId}`;
      const res = await fetch(url, {
        headers: { 'Authorization': `Bearer ${accessToken}` },
      });

      if (res.status === 401) {
        accessToken = null;
        updateAuthUI(false);
        renderPostListAuth();
        showToast('인증이 만료되었습니다. 다시 로그인하세요.', true);
        return;
      }

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error?.message || `HTTP ${res.status}`);
      }

      const post = await res.json();

      document.getElementById('editor-post-title').textContent = post.title || '(제목 없음)';
      document.getElementById('editor-post-meta').textContent =
        `발행일: ${post.published ? new Date(post.published).toLocaleString('ko-KR') : '알 수 없음'}`;

      const editor = document.getElementById('html-editor');
      editor.value = post.content || '';
      editor.dataset.isMock = 'false';

      // Update accordion preview with full content (rendered HTML)
      if (previewEl && accordionOpenPostId === postId) {
        previewEl.innerHTML = post.content || '<em style="color:var(--text-muted)">내용 없음</em>';
        injectImageDownloadUI(previewEl, post.title || '');
      }

      setEditorStatus('로드 완료');
    } catch (err) {
      setEditorStatus('로드 실패: ' + err.message);
      showToast('글 로드 실패: ' + err.message, true);
      if (previewEl && accordionOpenPostId === postId) {
        previewEl.innerHTML = `<em style="color:var(--danger)">로드 실패: ${escapeHtml(err.message)}</em>`;
      }
    }
  }

  // ── Naver panel ────────────────────────────────────────
  function renderNaverPanel(cfg) {

  function openNaverWrite() {
    const cfg = getBloggerConfig();
    const blogId = cfg.naver.blogId;
    const writeUrl = `https://blog.naver.com/PostWriteForm.naver?blogId=${blogId}`;

    // 팝업 위치: 화면 중앙
    const popupW = 900;
    const popupH = 800;
    const screenLeft = window.screenX !== undefined ? window.screenX : (window.screenLeft || 0);
    const screenTop  = window.screenY !== undefined ? window.screenY : (window.screenTop  || 0);
    const chromeBarH = window.outerHeight - window.innerHeight;
    const left = Math.round(screenLeft + (window.innerWidth - popupW) / 2);
    const top  = Math.round(screenTop  + chromeBarH + (window.innerHeight - popupH) / 2);

    const features = `width=${popupW},height=${popupH},left=${left},top=${top},resizable=yes,scrollbars=yes`;

    const popup = window.open(writeUrl, 'naverBlogPopup', features);

    if (!popup || popup.closed || typeof popup.closed === 'undefined') {
      alert('팝업이 차단되었습니다. 브라우저 팝업 허용 설정을 확인해주세요.');
      return;
    }

    popup.focus();
    showToast(`네이버 블로그 글쓰기 열기: ${blogId}`);

  // ── Schedule Panel ─────────────────────────────────────
  function updateScheduleAuthUI() {
    const authNotice = document.getElementById('schedule-auth-notice');
    const scheduleList = document.getElementById('schedule-list');
    if (!accessToken) {
      authNotice.classList.remove('hidden');
      scheduleList.style.display = 'none';
    } else {
      authNotice.classList.add('hidden');
      scheduleList.style.display = 'block';
    }

  async function loadSchedule() {
    if (!accessToken || !currentBlogId) {
      updateScheduleAuthUI();
      return;
    }
    updateScheduleAuthUI();

    const SPREADSHEET_ID = '1udn5v4CLYarCI3ILsfrmn84zVP3WuE3lUPWfWOON4oo';
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/schedule`;
    try {
      const res = await fetch(url, {
        headers: { 'Authorization': `Bearer ${accessToken}` }
      });
      if (res.status === 401) {
        accessToken = null;
        updateAuthUI(false);
        updateScheduleAuthUI();
        showToast('인증이 만료되었습니다. 다시 로그인하세요.', true);
        return;
      }
      const data = await res.json();
      const values = data.values || [];
      // values[0] is header row
      // columns: A=schedule_id, B=product_key, C=blog_id, D=blog_name, E=planned_date, F=post_index, G=angle, H=status, I=task_id, J=post_url, K=published_at
      const rows = values.slice(1); // skip header
      allScheduleRows = rows.map((row, i) => ({ row, rowNum: i + 2 })); // 전체 원본 캐시 (rowNum은 1-indexed, data는 2행부터)
      applyScheduleFilter();
    } catch(e) {
      console.error('Schedule load error', e);
      showToast('스케줄 로드 실패: ' + e.message, true);
    }
  }

  // 현재 상태(scheduleFilterProductKey)에 따라 스케줄 목록을 다시 그림
  // scheduleFilterProductKey: null = 글 미선택(블로그 전체 스케줄), 'NONE' = 선택한 글에 연결된 스케줄 없음, 그 외 = product_key로 필터링
  function applyScheduleFilter() {
    if (!currentBlogId) { renderSchedule([]); return; }

    let items;
    if (scheduleFilterProductKey && scheduleFilterProductKey !== 'NONE') {
      items = allScheduleRows
        .filter(({ row }) => row[2] === currentBlogId && row[1] === scheduleFilterProductKey)
        .sort((a, b) => (parseInt(a.row[5], 10) || 0) - (parseInt(b.row[5], 10) || 0));
    } else if (scheduleFilterProductKey === 'NONE') {
      items = [];
    } else {
      items = allScheduleRows
        .filter(({ row }) => row[2] === currentBlogId)
        .sort((a, b) => (a.row[4] || '').localeCompare(b.row[4] || ''));
    }
    renderScheduleFilterBanner();
    renderSchedule(items);
  }

  function filterScheduleByPost(post) {
    if (!post || !post.url) { scheduleFilterProductKey = null; applyScheduleFilter(); return; }
    const match = allScheduleRows.find(({ row }) =>
      row[2] === currentBlogId && row[9] && normalizeUrl(row[9]) === normalizeUrl(post.url)
    );
    scheduleFilterProductKey = match ? match.row[1] : 'NONE';
    applyScheduleFilter();
  }

  function normalizeUrl(u) {
    return (u || '').trim().replace(/\/$/, '').replace(/^https?:\/\//, '');
  }

  function clearScheduleFilter() {
    scheduleFilterProductKey = null;
    applyScheduleFilter();
  }

  function renderScheduleFilterBanner() {
    let banner = document.getElementById('schedule-filter-banner');
    const scheduleList = document.getElementById('schedule-list');
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'schedule-filter-banner';
      banner.style.cssText = 'font-size:11px;color:var(--text-muted);padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;justify-content:space-between;align-items:center;gap:8px;';
      scheduleList.parentNode.insertBefore(banner, scheduleList);
    }
    if (scheduleFilterProductKey === 'NONE') {
      banner.style.display = 'flex';
      banner.innerHTML = `<span>선택한 글에 연결된 발행 스케줄이 없습니다</span><button class="btn btn-secondary" style="padding:2px 8px;font-size:11px;flex-shrink:0;" onclick="clearScheduleFilter()">전체 보기</button>`;
    } else if (scheduleFilterProductKey) {
      banner.style.display = 'flex';
      banner.innerHTML = `<span>선택한 글의 발행 스케줄 (상품: ${escapeHtml(scheduleFilterProductKey)})</span><button class="btn btn-secondary" style="padding:2px 8px;font-size:11px;flex-shrink:0;" onclick="clearScheduleFilter()">전체 보기</button>`;
    } else {
      banner.style.display = 'none';
    }
  }

  function renderSchedule(items) {
    const container = document.getElementById('schedule-list');
    if (!container) return;
    container.innerHTML = '';

    if (items.length === 0) {
      container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:16px;text-align:center;">스케줄 항목이 없습니다.</div>';
      return;
    }

    items.forEach(({ row, rowNum }) => {
      const [scheduleId, productKey, blogId, blogName, plannedDate, postIndex, angle, status, taskId, postUrl, publishedAt] = row;
      const item = document.createElement('div');
      item.className = 'schedule-item';
      const statusBadge = status === 'DONE'
        ? '<span class="badge-done">완료</span>'
        : '<span class="badge-pending">대기</span>';

      if (status === 'DONE' && postUrl) {
        item.innerHTML = `<div class="schedule-row clickable" onclick="window.open('${postUrl}','_blank')">
          <span class="post-index">${postIndex || '?'}/10 회차</span>
          <span class="planned-date">${plannedDate || ''}</span>
          ${statusBadge}
          <span class="angle-text">${angle || ''}</span>
        </div>`;
      } else if (status === 'PENDING') {
        item.innerHTML = `<div class="schedule-row" data-row="${rowNum}" data-schedule-id="${scheduleId}">
          <span class="post-index">${postIndex || '?'}/10 회차</span>
          <span class="planned-date">${plannedDate || ''}</span>
          ${statusBadge}
          <span class="angle-text editable" onclick="editAngle(this, ${rowNum})">${angle || ''}</span>
        </div>`;
      } else {
        item.innerHTML = `<div class="schedule-row">
          <span class="post-index">${postIndex || '?'}/10 회차</span>
          <span class="planned-date">${plannedDate || ''}</span>
          ${statusBadge}
          <span class="angle-text">${angle || ''}</span>
        </div>`;
      }
      container.appendChild(item);
    });
  }

  function editAngle(el, rowNum) {
    const currentVal = el.textContent;
    const parent = el.closest('.schedule-row');

    const input = document.createElement('input');
    input.type = 'text';
    input.value = currentVal;
    input.className = 'angle-input';

    saveBtn.textContent = '저장';
    saveBtn.className = 'btn-save-angle';

    const SPREADSHEET_ID = '1udn5v4CLYarCI3ILsfrmn84zVP3WuE3lUPWfWOON4oo';

  function resetEditor() {
    document.getElementById('editor-post-title').textContent = '글을 선택하면 본문이 로드됩니다';
    document.getElementById('editor-post-meta').textContent = '← 왼쪽 패널에서 글을 클릭하세요';

  function setEditorStatus(msg) {
    document.getElementById('editor-status').textContent = msg;
  }

  function formatHtml() {
    const el = document.getElementById('html-editor');
    try {
      let html = el.value;
      let indent = 0;
      html = html
        .replace(/></g, '>\n<')
        .split('\n')
        .map(line => {
          line = line.trim();
          if (!line) return '';
          if (/^<\//.test(line)) indent = Math.max(0, indent - 1);
          const out = '  '.repeat(indent) + line;
          if (/^<[^/!]/.test(line) && !/\/>$/.test(line) && !/<(br|img|input|hr|meta|link)/i.test(line)) indent++;
          return out;
        })
        .filter(Boolean)
        .join('\n');
      el.value = html;
      showToast('HTML 정렬 완료');
    } catch (e) {
      showToast('정렬 실패: ' + e.message, true);
    }
  }

  async function handleSavePost() {
    if (!accessToken) {
      showToast('구글 로그인이 필요합니다.', true);
      return;
    }
    if (!currentPostId) {
      showToast('저장할 글이 선택되지 않았습니다.', true);
      return;
    }

    const html = document.getElementById('html-editor').value;
    if (!html.trim()) { showToast('본문 내용이 없습니다.', true); return; }

    setEditorStatus('저장 중...');
    document.getElementById('btn-save-post').disabled = true;

    try {
      const url = `https://www.googleapis.com/blogger/v3/blogs/${currentBlogId}/posts/${currentPostId}`;
      const title = document.getElementById('editor-post-title').textContent;

      const res = await fetch(url, {
        method: 'PUT',
        headers: {
          'Authorization': `Bearer ${accessToken}`,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ kind: 'blogger#post', id: currentPostId, title, content: html }),
      });

      if (res.status === 401) {
        accessToken = null;
        updateAuthUI(false);
        renderPostListAuth();
        showToast('인증이 만료되었습니다. 다시 로그인하세요.', true);
        return;
      }

      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error?.message || `HTTP ${res.status}`);
      }

      setEditorStatus('✅ 저장 완료 (재발행됨)');
      showToast('✅ 글이 성공적으로 저장(재발행)되었습니다.');
    } catch (err) {
      setEditorStatus('저장 실패: ' + err.message);
      showToast('저장 실패: ' + err.message, true);
    } finally {
      updateSaveButton();
    }
  }

  // ── 카페24 상품NO 기반 사업자별 등록 → n8n webhook ─────────
  // NOTE: 백엔드(HappyJ1-Blog n8n 워크플로우)는 아직 이 payload 형태(cafe24_product_no 기반
  // 카페24 상품조회 + 상세이미지 비전분석)를 처리하도록 개조되지 않았음 — 프론트엔드 선작업.
  function getBizInputs(mall) {
    const noInput  = document.querySelector(`.cafe24-no-input[data-mall="${mall}"]`);
    const urlInput = document.querySelector(`.ss-url-input[data-mall="${mall}"]`);
    return {
      noInput,
      urlInput,
      cafe24ProductNo: noInput ? noInput.value.trim() : '',
      smartstoreUrl:   urlInput ? urlInput.value.trim() : '',
    };
  }

  async function sendMallRegister(mall) {
    const { noInput, cafe24ProductNo, smartstoreUrl } = getBizInputs(mall);

    if (!cafe24ProductNo) {
      showToast(`${mall}: 카페24 상품NO를 입력해주세요.`, true);
      if (noInput) noInput.focus();
      return false;
    }

    const payload = {
      mall,
      cafe24_product_no: cafe24ProductNo,
      smartstore_url:    smartstoreUrl,
    };

    try {
      const res = await fetch(WEBHOOK_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json().catch(() => ({}));
      console.log(`[HappyJ1] ${mall} webhook response:`, data);
      return true;
    } catch (err) {
      showToast(`❌ ${mall} 전송 실패: ${err.message}`, true);
      console.error(`[HappyJ1] ${mall} webhook error:`, err);
      return false;
    }
  }

  async function handleSendOne(mall) {
    showToast(`${mall} 전송 중...`);
    const ok = await sendMallRegister(mall);
    if (ok) showToast(`✅ ${mall} 전송 완료 — 카페24 상품NO: ${getBizInputs(mall).cafe24ProductNo}`);
  }

  async function handleSendAll() {
    const malls = ['소울스토어', '제이원투몰', '행복산업'];
    const targets = malls.filter(m => getBizInputs(m).cafe24ProductNo);

    if (targets.length === 0) {
      showToast('전송할 사업자의 카페24 상품NO를 하나 이상 입력해주세요.', true);
      return;
    }

    showToast(`전체 전송 중... (${targets.join(', ')})`);
    const results = await Promise.all(targets.map(m => sendMallRegister(m)));
    const successCount = results.filter(Boolean).length;
    showToast(`✅ 전체 전송 완료 (${successCount}/${targets.length}건 성공)`);
  }

  // ── Image Download Helpers ────────────────────────────

  /**
   * Parse all <img> src values from an HTML string.
   * Returns an array of src strings.
   */
  function parseImgSrcs(htmlStr) {
    const tmp = document.createElement('div');
    tmp.innerHTML = htmlStr;
    return Array.from(tmp.querySelectorAll('img'))
      .map(img => img.getAttribute('src'))
      .filter(Boolean);
  }

  /**
   * Sanitize a string to be used as part of a filename.
   * Removes characters that are not alphanumeric, spaces, hyphens, or underscores.
   */
  function sanitizeFilename(str) {
    return str.replace(/[^\w\s가-힣\-]/g, '').trim();
  }

  /**
   * Derive an extension from a URL or default to 'png'.
   */
  function getImgExt(url) {
    try {
      const pathname = new URL(url).pathname;
      const ext = pathname.split('.').pop().split('?')[0].toLowerCase();
      if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp', 'svg'].includes(ext)) {
        return ext === 'jpeg' ? 'jpg' : ext;
      }
    } catch (_) { /* ignore */ }
    return 'png';
  }

  /**
   * Download a single image by src, using given filename.
   * Falls back to window.open on CORS / fetch failure.
   */
  async function downloadImage(src, filename) {
    try {
      const res = await fetch(src);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const blob = await res.blob();
      const objectUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = objectUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(objectUrl), 10000);
    } catch (_) {
      // CORS or network failure — open in new tab as fallback
      window.open(src, '_blank');
    }
  }

  /**
   * Download all images from the current accordion preview sequentially.
   * Triggered by the bulk download button.
   */
  async function downloadAllImages(srcs, postTitle) {
    const baseName = sanitizeFilename(postTitle || '이미지');
    for (let i = 0; i < srcs.length; i++) {
      const ext = getImgExt(srcs[i]);
      const filename = `${baseName}_${i + 1}.${ext}`;
      await downloadImage(srcs[i], filename);
    }
  }

  /**
   * Inject image download UI into a preview element.
   * - Wraps each <img> in a relative container with an individual download button.
   * - Prepends a bulk "download all" bar if there are 1+ images.
   */
  function injectImageDownloadUI(previewEl, postTitle) {
    // Wrap each img with overlay container
    const imgs = previewEl.querySelectorAll('img');
    if (imgs.length === 0) return;

    const srcs = [];
    imgs.forEach((img, idx) => {
      const src = img.getAttribute('src');
      if (!src) return;
      srcs.push(src);

      const baseName = sanitizeFilename(postTitle || '이미지');
      const ext = getImgExt(src);
      const filename = `${baseName}_${idx + 1}.${ext}`;

      const wrap = document.createElement('div');
      wrap.className = 'preview-img-wrap';

      const dlBtn = document.createElement('button');
      dlBtn.className = 'btn-img-dl-single';
      dlBtn.title = '이미지 다운로드';
      dlBtn.textContent = '⬇';
      dlBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        downloadImage(src, filename);
      });

      img.parentNode.insertBefore(wrap, img);
      wrap.appendChild(img);
      wrap.appendChild(dlBtn);
    });

    // Prepend bulk download bar
    if (srcs.length > 0) {
      const bar = document.createElement('div');
      bar.className = 'img-download-bar';

      const allBtn = document.createElement('button');
      allBtn.className = 'btn-img-download-all';
      allBtn.textContent = `🖼 이미지 ${srcs.length}개 전체 다운로드`;
      allBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        downloadAllImages(srcs, postTitle);
      });

      bar.appendChild(allBtn);
      previewEl.insertBefore(bar, previewEl.firstChild);
    }
  }

  // ── Utilities ─────────────────────────────────────────
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Toast helper ──────────────────────────────────────
  let toastTimer;
  function showToast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.toggle('error', isError);
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }
